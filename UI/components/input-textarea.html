<!-- ── Inputs ──
     The .input class works on input, textarea, and select.            -->

<label class="section-label" for="patient-id">Patient ID</label>
<input id="patient-id" class="input" type="text" placeholder="e.g., MR-1029" />

<label class="section-label" for="notes">Notes</label>
<textarea id="notes" class="input" rows="3" placeholder="Add a comment…"></textarea>

<label class="section-label" for="side">Side</label>
<select id="side" class="input">
  <option>Left</option>
  <option>Right</option>
</select>
