<!-- ── Button component ──
     Variants: primary | flat | ghost | accent | danger
     Sizes:    default | sm                                  -->

<!-- Primary: the single most important call-to-action -->
<button class="btn btn-primary">Save</button>

<!-- Flat (tinted teal): secondary brand action -->
<button class="btn btn-flat">Open Dashboard</button>

<!-- Ghost (outlined): tertiary actions, toolbars -->
<button class="btn btn-ghost">Cancel</button>

<!-- Accent (toggleable): add .active when on -->
<button class="btn btn-accent active" aria-pressed="true">Implant On</button>
<button class="btn btn-accent" aria-pressed="false">Auto Measure</button>

<!-- Danger -->
<button class="btn btn-danger">Delete</button>

<!-- Small variants -->
<button class="btn btn-primary btn-sm">Save</button>
<button class="btn btn-ghost btn-sm">More</button>

<!-- With an icon -->
<button class="btn btn-flat btn-sm">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <rect x="3" y="3" width="7" height="9"/>
    <rect x="14" y="3" width="7" height="5"/>
    <rect x="14" y="12" width="7" height="9"/>
    <rect x="3" y="16" width="7" height="5"/>
  </svg>
  Surgery Dashboard
</button>

<!-- Disabled -->
<button class="btn btn-primary" disabled>Save</button>
