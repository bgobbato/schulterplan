<!-- ── Control trio (decrement / value / increment) ── -->

<div class="control-row">
  <button class="ctrl-btn" aria-label="Decrease retroversion">←</button>
  <div class="ctrl-label">
    <div class="name">Retroversion</div>
    <div class="value">0.0°</div>
  </div>
  <button class="ctrl-btn" aria-label="Increase retroversion">→</button>
</div>

<div class="control-row">
  <button class="ctrl-btn" aria-label="Decrease inferior inclination">↓</button>
  <div class="ctrl-label">
    <div class="name">Inferior Incl.</div>
    <div class="value">0.0°</div>
  </div>
  <button class="ctrl-btn" aria-label="Increase inferior inclination">↑</button>
</div>

<div class="control-row">
  <button class="ctrl-btn" aria-label="Decrease depth">−</button>
  <div class="ctrl-label">
    <div class="name">Depth</div>
    <div class="value">0mm</div>
  </div>
  <button class="ctrl-btn" aria-label="Increase depth">+</button>
</div>
