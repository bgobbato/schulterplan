<!-- ── Measure Row ──
     Label / value pair. Lives inside .card. Hairline between rows.   -->

<div class="card">
  <div class="measure-row">
    <span class="label">SI (Y)</span>
    <span class="value">0mm</span>
  </div>
  <div class="measure-row">
    <span class="label">AP (X)</span>
    <span class="value">+1mm</span>
  </div>
  <div class="measure-row">
    <span class="label">Axial Rot.</span>
    <span class="value">−2°</span>
  </div>
</div>
