<!-- ── Arrow Pad (3×3) ──
     Top row: empty | ↑ | empty
     Mid row:   ←   |   | →
     Btm row:  ↺    | ↓ | ↻      (rotation flanking center axis)        -->

<div class="arrow-pad" role="group" aria-label="Translation and axial rotation">
  <div class="empty"></div>
  <button class="ctrl-btn" aria-label="Translate up">↑</button>
  <div class="empty"></div>

  <button class="ctrl-btn" aria-label="Translate left">←</button>
  <div class="empty"></div>
  <button class="ctrl-btn" aria-label="Translate right">→</button>

  <button class="ctrl-btn" aria-label="Rotate counter-clockwise">↺</button>
  <button class="ctrl-btn" aria-label="Translate down">↓</button>
  <button class="ctrl-btn" aria-label="Rotate clockwise">↻</button>
</div>
