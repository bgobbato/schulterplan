<!-- ── Implant Card ──
     A selectable tile inside .implant-grid.
     Selected state adds the .selected class (teal ring + filled icon). -->

<div class="implant-group-label">Glenoid Cementless Anatomical</div>
<div class="implant-grid">

  <!-- Selected -->
  <div class="implant-card selected" role="button" tabindex="0" aria-pressed="true">
    <div class="icon">
      <svg viewBox="0 0 70 52" fill="currentColor" style="width:100%;height:100%" aria-hidden="true">
        <rect x="2" y="4" width="10" height="44" rx="3" opacity="0.8"/>
        <rect x="14" y="16" width="34" height="20" rx="2" opacity="0.85"/>
        <path d="M48,16 Q52,26 48,36" opacity="0.6"/>
        <circle cx="24" cy="26" r="2.5" fill="white" opacity="0.55"/>
        <circle cx="33" cy="26" r="2.3" fill="white" opacity="0.5"/>
        <circle cx="42" cy="26" r="2" fill="white" opacity="0.4"/>
      </svg>
    </div>
    <span>Size 2</span><span>Short</span>
  </div>

  <!-- Unselected -->
  <div class="implant-card" role="button" tabindex="0" aria-pressed="false">
    <div class="icon">
      <svg viewBox="0 0 70 56" fill="currentColor" style="width:100%;height:100%" aria-hidden="true">
        <rect x="2" y="4" width="10" height="44" rx="3" opacity="0.8"/>
        <rect x="14" y="16" width="46" height="20" rx="2" opacity="0.85"/>
        <path d="M60,16 Q64,26 60,36" opacity="0.6"/>
        <circle cx="22" cy="26" r="2.3" fill="white" opacity="0.55"/>
        <circle cx="31" cy="26" r="2.2" fill="white" opacity="0.5"/>
        <circle cx="40" cy="26" r="2" fill="white" opacity="0.45"/>
        <circle cx="49" cy="26" r="1.8" fill="white" opacity="0.38"/>
      </svg>
    </div>
    <span>Size 2</span><span>Long</span>
  </div>

</div>
